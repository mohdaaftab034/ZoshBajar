services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zosh-backend
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 5000
    expose:
      - "5000"
    networks:
      - zosh-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/zosh-bazaar
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: /api
    container_name: zosh-frontend
    depends_on:
      - backend
    environment:
      PORT: 8080
      BACKEND_URL: http://backend:5000
    ports:
      - "8080:8080"
    networks:
      - zosh-net
    restart: unless-stopped

networks:
  zosh-net:
    driver: bridge
