services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zosh-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/zosh-bazaar
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: /api
    container_name: zosh-frontend
    depends_on:
      - backend
    environment:
      PORT: 8080
    ports:
      - "8080:8080"
    restart: unless-stopped
